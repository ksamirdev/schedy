name: Docker

on:
  push:
    tags: ["v*.*.*"] # publish on version tags only
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to registry (only for testing, use version tags for production)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/schedy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only version tags publish automatically. workflow_dispatch requires explicit input.
      - name: Decide whether to publish
        id: flag
        run: |
          is_version_tag=${{ startsWith(github.ref, 'refs/tags/v') }}
          is_manual_publish=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
          echo "push=$([ "$is_version_tag" = "true" ] || [ "$is_manual_publish" = "true" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: steps.flag.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.flag.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.flag.outputs.push == 'true' && format('docker.io/{0}/schedy', secrets.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.flag.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
