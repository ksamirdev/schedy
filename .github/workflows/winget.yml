name: Publish to Winget

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Publish to Winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: ksamirdev.schedy
          installers-regex: '.*Windows.*\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
